name: Deploy to Production

  on:
    push:
      branches: [main]
      paths:
        - 'backend/**'
        - 'k8s/**'
        - '.github/workflows/deploy.yml'

  jobs:
    build-and-push:
      name: Build Docker Image
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write

      steps:
        - uses: actions/checkout@v4

        - name: Log in to GitHub Container Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Extract metadata
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ghcr.io/hossam-create/geocore-next/backend
            tags: |
              type=sha,prefix=sha-
              type=raw,value=latest

        - name: Build and push
          uses: docker/build-push-action@v5
          with:
            context: ./backend
            file: ./backend/Dockerfile.prod
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            cache-from: type=gha
            cache-to: type=gha,mode=max

    deploy:
      name: Deploy to Kubernetes
      runs-on: ubuntu-latest
      needs: build-and-push
      environment: production

      steps:
        - uses: actions/checkout@v4

        - name: Set up kubectl
          uses: azure/setup-kubectl@v3

        - name: Configure kubeconfig
          run: |
            mkdir -p ~/.kube
            echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
            chmod 600 ~/.kube/config

        - name: Apply Kubernetes manifests
          run: |
            kubectl apply -f k8s/namespace.yaml
            kubectl apply -f k8s/configmap.yaml
            kubectl apply -f k8s/backend-deployment.yaml
            kubectl apply -f k8s/ingress.yaml

        - name: Update image
          run: |
            IMAGE="ghcr.io/hossam-create/geocore-next/backend:sha-${{ github.sha }}"
            kubectl set image deployment/geocore-backend api=${IMAGE} -n geocore-prod

        - name: Rollout status
          run: |
            kubectl rollout status deployment/geocore-backend -n geocore-prod --timeout=300s

        - name: Verify health
          run: |
            sleep 10
            curl -f https://api.geocore.app/health || exit 1
  