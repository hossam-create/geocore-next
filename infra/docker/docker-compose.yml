# GeoCore — Local Development Stack
  # Usage: make dev   OR   docker compose up -d
  version: "3.9"

  x-common-env: &common-env
    TZ: Asia/Dubai
    LANG: en_US.UTF-8

  services:
    # ── Database ────────────────────────────────────────────────────────────────
    postgres:
      image: pgvector/pgvector:pg16
      container_name: geocore-postgres
      restart: unless-stopped
      environment:
        <<: *common-env
        POSTGRES_DB: ${POSTGRES_DB:-geocore}
        POSTGRES_USER: ${POSTGRES_USER:-geocore}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geocore_secret}
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./infra/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      ports:
        - "5432:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geocore}"]
        interval: 10s
        timeout: 5s
        retries: 5

    # ── Cache / Pub-Sub ──────────────────────────────────────────────────────────
    redis:
      image: redis:7-alpine
      container_name: geocore-redis
      restart: unless-stopped
      command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
      volumes:
        - redis_data:/data
      ports:
        - "6379:6379"
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

    # ── Go API ────────────────────────────────────────────────────────────────────
    api:
      build:
        context: .
        dockerfile: infra/docker/Dockerfile.api
      container_name: geocore-api
      restart: unless-stopped
      environment:
        <<: *common-env
        PORT: "8080"
        GIN_MODE: release
        DATABASE_URL: postgres://${POSTGRES_USER:-geocore}:${POSTGRES_PASSWORD:-geocore_secret}@postgres:5432/${POSTGRES_DB:-geocore}?sslmode=disable
        REDIS_URL: redis://redis:6379
        JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
        STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
        CLOUDFLARE_R2_BUCKET: ${CLOUDFLARE_R2_BUCKET}
        CLOUDFLARE_R2_ACCESS_KEY: ${CLOUDFLARE_R2_ACCESS_KEY}
        CLOUDFLARE_R2_SECRET_KEY: ${CLOUDFLARE_R2_SECRET_KEY}
        CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT}
        AI_PRICING_URL: ${AI_PRICING_URL:-http://ai-service:8090}
      ports:
        - "8080:8080"
      depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
      healthcheck:
        test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 15s

    # ── Next.js Web Frontend ──────────────────────────────────────────────────────
    frontend:
      build:
        context: .
        dockerfile: infra/docker/Dockerfile.frontend
      container_name: geocore-frontend
      restart: unless-stopped
      environment:
        <<: *common-env
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
      ports:
        - "3000:3000"
      depends_on:
        api:
          condition: service_healthy

    # ── React Admin Panel ─────────────────────────────────────────────────────────
    admin:
      build:
        context: .
        dockerfile: infra/docker/Dockerfile.admin
      container_name: geocore-admin
      restart: unless-stopped
      ports:
        - "3001:80"
      depends_on:
        - api

    # ── AI Pricing Service ────────────────────────────────────────────────────────
    ai-service:
      build:
        context: ./ai-service
      container_name: geocore-ai
      restart: unless-stopped
      environment:
        <<: *common-env
        PORT: "8090"
      ports:
        - "8090:8090"

    # ── DB Admin (pgAdmin) ────────────────────────────────────────────────────────
    pgadmin:
      image: dpage/pgadmin4:latest
      container_name: geocore-pgadmin
      restart: unless-stopped
      profiles: ["tools"]
      environment:
        PGADMIN_DEFAULT_EMAIL: admin@geocore.app
        PGADMIN_DEFAULT_PASSWORD: admin
      ports:
        - "8083:80"
      depends_on:
        - postgres

  volumes:
    postgres_data:
      driver: local
    redis_data:
      driver: local

  networks:
    default:
      name: geocore-network
  