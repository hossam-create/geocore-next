apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: redis
    namespace: geocore
    labels:
      app: redis
      tier: cache
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: redis
    template:
      metadata:
        labels:
          app: redis
          tier: cache
      spec:
        containers:
          - name: redis
            image: redis:7-alpine
            imagePullPolicy: IfNotPresent
            command:
              - redis-server
              - "--appendonly"
              - "yes"
              - "--maxmemory"
              - "512mb"
              - "--maxmemory-policy"
              - "allkeys-lru"
              - "--save"
              - "60"
              - "1000"
            ports:
              - containerPort: 6379
                name: redis
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "500m"
                memory: "768Mi"
            livenessProbe:
              exec:
                command: ["redis-cli", "ping"]
              initialDelaySeconds: 15
              periodSeconds: 10
            readinessProbe:
              exec:
                command: ["redis-cli", "ping"]
              initialDelaySeconds: 5
              periodSeconds: 5
            volumeMounts:
              - name: redis-data
                mountPath: /data
        volumes:
          - name: redis-data
            emptyDir: {}          # Use PVC for production persistence
  