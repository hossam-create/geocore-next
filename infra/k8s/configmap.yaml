apiVersion: v1
  kind: ConfigMap
  metadata:
    name: geocore-config
    namespace: geocore
    labels:
      app.kubernetes.io/name: geocore
  data:
    # Go API
    GIN_MODE: "release"
    PORT: "8080"
    TZ: "Asia/Dubai"
    LOG_LEVEL: "info"

    # Database
    POSTGRES_DB: "geocore"
    POSTGRES_PORT: "5432"
    POSTGRES_HOST: "postgres-service"

    # Redis
    REDIS_HOST: "redis-service"
    REDIS_PORT: "6379"

    # Frontend
    NEXT_PUBLIC_API_URL: "https://api.geocore.app"
    NEXT_PUBLIC_WS_URL: "wss://api.geocore.app"
    NEXT_TELEMETRY_DISABLED: "1"

    # AI Service
    AI_PRICING_URL: "http://ai-service:8090"
    AI_PRICING_ENABLED: "true"

    # GCC Settings
    DEFAULT_CURRENCY: "AED"
    SUPPORTED_CURRENCIES: "AED,SAR,KWD,QAR,BHD,OMR"
    DEFAULT_TIMEZONE: "Asia/Dubai"
  