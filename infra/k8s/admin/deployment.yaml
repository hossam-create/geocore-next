apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: geocore-admin
    namespace: geocore
    labels:
      app: geocore-admin
      tier: admin
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: geocore-admin
    template:
      metadata:
        labels:
          app: geocore-admin
          tier: admin
      spec:
        containers:
          - name: admin
            image: ghcr.io/hossam-create/geocore-admin:latest
            imagePullPolicy: Always
            ports:
              - containerPort: 80
                name: http
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "200m"
                memory: "128Mi"
            livenessProbe:
              httpGet:
                path: /health
                port: 80
              initialDelaySeconds: 10
              periodSeconds: 30
  ---
  apiVersion: v1
  kind: Service
  metadata:
    name: admin-service
    namespace: geocore
    labels:
      app: geocore-admin
  spec:
    type: ClusterIP
    selector:
      app: geocore-admin
    ports:
      - port: 80
        targetPort: 80
        name: http
  