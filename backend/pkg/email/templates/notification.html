{{define "notification.html"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.Title}}</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f9;padding:40px 0;">
  <tr><td align="center">
    <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);">

      <!-- Header -->
      <tr><td style="background:#1a56db;padding:28px 40px;text-align:center;">
        <span style="color:#ffffff;font-size:22px;font-weight:700;letter-spacing:.5px;">GeoCore</span>
      </td></tr>

      <!-- Body -->
      <tr><td style="padding:36px 40px 28px;">
        <p style="margin:0 0 16px;font-size:16px;color:#374151;">Hi {{.Name}},</p>
        <h2 style="margin:0 0 16px;font-size:19px;color:#111827;line-height:1.4;">{{.Title}}</h2>
        <p style="margin:0 0 28px;font-size:15px;color:#6b7280;line-height:1.65;">{{.Body}}</p>

        {{if .CTAURL}}
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr><td align="center">
            <a href="{{.CTAURL}}"
               style="display:inline-block;background:#1a56db;color:#ffffff;font-size:14px;font-weight:600;
                      text-decoration:none;padding:12px 32px;border-radius:6px;">
              {{if .CTAText}}{{.CTAText}}{{else}}View Details{{end}}
            </a>
          </td></tr>
        </table>
        {{end}}
      </td></tr>

      <!-- Unsubscribe note -->
      <tr><td style="padding:0 40px 16px;">
        <p style="margin:0;font-size:12px;color:#d1d5db;text-align:center;">
          You are receiving this because you have an account on GeoCore.
        </p>
      </td></tr>

      <!-- Footer -->
      <tr><td style="background:#f9fafb;padding:20px 40px;border-top:1px solid #e5e7eb;text-align:center;">
        <p style="margin:0;font-size:12px;color:#9ca3af;">
          &copy; {{year}} GeoCore &mdash; The GCC Marketplace
        </p>
      </td></tr>

    </table>
  </td></tr>
</table>
</body>
</html>{{end}}
