apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    name: geocore-ingress
    namespace: geocore-prod
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-origin: "https://geocore.app"
      nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
      nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
  spec:
    tls:
      - hosts:
          - api.geocore.app
        secretName: geocore-api-tls
      - hosts:
          - geocore.app
        secretName: geocore-web-tls
    rules:
      - host: api.geocore.app
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: geocore-backend-svc
                  port:
                    number: 80
  