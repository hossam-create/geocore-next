apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: geocore-frontend
    namespace: geocore
    labels:
      app: geocore-frontend
      tier: frontend
  spec:
    replicas: 2
    selector:
      matchLabels:
        app: geocore-frontend
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    template:
      metadata:
        labels:
          app: geocore-frontend
          tier: frontend
      spec:
        containers:
          - name: frontend
            image: ghcr.io/hossam-create/geocore-frontend:latest
            imagePullPolicy: Always
            ports:
              - containerPort: 3000
                name: http
            env:
              - name: NEXT_PUBLIC_API_URL
                valueFrom:
                  configMapKeyRef:
                    name: geocore-config
                    key: NEXT_PUBLIC_API_URL
              - name: NEXT_PUBLIC_WS_URL
                valueFrom:
                  configMapKeyRef:
                    name: geocore-config
                    key: NEXT_PUBLIC_WS_URL
              - name: NODE_ENV
                value: "production"
            resources:
              requests:
                cpu: "200m"
                memory: "256Mi"
              limits:
                cpu: "800m"
                memory: "512Mi"
            livenessProbe:
              httpGet:
                path: /api/health
                port: 3000
              initialDelaySeconds: 20
              periodSeconds: 30
              timeoutSeconds: 5
            readinessProbe:
              httpGet:
                path: /api/health
                port: 3000
              initialDelaySeconds: 10
              periodSeconds: 10
  ---
  apiVersion: v1
  kind: Service
  metadata:
    name: frontend-service
    namespace: geocore
    labels:
      app: geocore-frontend
  spec:
    type: ClusterIP
    selector:
      app: geocore-frontend
    ports:
      - port: 3000
        targetPort: 3000
        name: http
  