# NGINX Ingress Controller — TLS terminated
  # Install controller: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
  #
  # Cert-manager for automatic TLS:
  #   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.4/cert-manager.yaml
  #   kubectl apply -f infra/k8s/cert-issuer.yaml

  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    name: geocore-ingress
    namespace: geocore
    annotations:
      kubernetes.io/ingress.class: "nginx"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"          # For image uploads
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"        # For WebSocket
      nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
      nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
      # WebSocket support for auction/chat
      nginx.ingress.kubernetes.io/configuration-snippet: |
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection "upgrade";
      # Rate limiting (anti-abuse)
      nginx.ingress.kubernetes.io/limit-rps: "100"
      nginx.ingress.kubernetes.io/limit-connections: "20"
      # TLS (cert-manager)
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      # CORS for GCC regions
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-origin: "https://geocore.app,https://admin.geocore.app"
  spec:
    tls:
      - hosts:
          - geocore.app
          - www.geocore.app
          - api.geocore.app
          - admin.geocore.app
        secretName: geocore-tls
    rules:
      # Web Marketplace → Next.js
      - host: geocore.app
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: frontend-service
                  port:
                    number: 3000
      - host: www.geocore.app
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: frontend-service
                  port:
                    number: 3000

      # REST API + WebSocket → Go backend
      - host: api.geocore.app
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: api-service
                  port:
                    number: 8080

      # Admin Panel → React + Vite
      - host: admin.geocore.app
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: admin-service
                  port:
                    number: 80
  