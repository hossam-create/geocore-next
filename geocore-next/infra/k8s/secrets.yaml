# ⚠️  TEMPLATE — Replace all <CHANGE_ME> values before applying
  # Never commit real secrets to git!
  # Usage: kubectl apply -f infra/k8s/secrets.yaml
  #
  # Encode values:  echo -n "my-secret" | base64
  # Decode values:  echo "bXktc2VjcmV0" | base64 -d

  apiVersion: v1
  kind: Secret
  metadata:
    name: geocore-secrets
    namespace: geocore
    labels:
      app.kubernetes.io/name: geocore
  type: Opaque
  data:
    # Database — base64 encoded
    POSTGRES_USER: Z2VvY29yZQ==          # geocore
    POSTGRES_PASSWORD: <CHANGE_ME>        # base64(your-strong-password)
    DATABASE_URL: <CHANGE_ME>             # base64(postgres://geocore:password@postgres-service:5432/geocore?sslmode=require)

    # Auth
    JWT_SECRET: <CHANGE_ME>              # base64(random-256-bit-secret)
    JWT_REFRESH_SECRET: <CHANGE_ME>      # base64(another-random-256-bit-secret)

    # Stripe
    STRIPE_SECRET_KEY: <CHANGE_ME>       # base64(sk_live_...)
    STRIPE_WEBHOOK_SECRET: <CHANGE_ME>   # base64(whsec_...)

    # Cloudflare R2
    CLOUDFLARE_R2_ACCESS_KEY: <CHANGE_ME>
    CLOUDFLARE_R2_SECRET_KEY: <CHANGE_ME>
    CLOUDFLARE_R2_ENDPOINT: <CHANGE_ME>  # base64(https://ACCOUNT_ID.r2.cloudflarestorage.com)
    CLOUDFLARE_R2_BUCKET: Z2VvY29yZS1tZWRpYQ==  # geocore-media

    # OpenAI (for AI Search)
    OPENAI_API_KEY: <CHANGE_ME>          # base64(sk-...)

    # Redis (optional password)
    REDIS_PASSWORD: <CHANGE_ME>
  