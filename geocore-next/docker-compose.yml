version: '3.9'

services:

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: geocore
      DB_PASSWORD: geocore_secret
      DB_NAME: geocore
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: dev_secret_geocore_next_32_chars_min
      FRONTEND_URL: http://localhost:3000
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
    volumes:
      - ./backend:/app
      - go_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [net]

  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: geocore
      POSTGRES_PASSWORD: geocore_secret
      POSTGRES_DB: geocore
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geocore -d geocore"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [net]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks: [net]

  meilisearch:
    image: getmeili/meilisearch:v1.10
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: dev_meili_key
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    networks: [net]

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on: [postgres]
    networks: [net]

volumes:
  pg_data:
  redis_data:
  meili_data:
  go_cache:

networks:
  net:
    driver: bridge
