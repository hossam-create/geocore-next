# V2 deployment — receives canary traffic via api-canary.yaml
# Monitor: error rate, p95 latency, Kafka lag before promoting
# Rollback: kubectl rollout undo deployment/geocore-backend-v2
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geocore-backend-v2
  namespace: geocore-prod
  labels:
    app: geocore-backend-v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geocore-backend-v2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: geocore-backend-v2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: geocore-backend
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: ghcr.io/hossam-create/geocore-next/backend:v2
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: geocore-config
            - secretRef:
                name: geocore-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: geocore-backend-v2-svc
  namespace: geocore-prod
spec:
  selector:
    app: geocore-backend-v2
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
