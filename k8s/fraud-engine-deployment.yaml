apiVersion: apps/v1
kind: Deployment
metadata:
  name: geocore-fraud-engine
  namespace: geocore-prod
  labels:
    app: geocore-fraud-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geocore-fraud-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: geocore-fraud-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: geocore-backend
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: fraud-engine
          image: __ECR_REGISTRY__/geocore-fraud-engine:latest
          command: ["./server"]
          envFrom:
            - configMapRef:
                name: geocore-config
            - secretRef:
                name: geocore-secrets
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "server"]
            initialDelaySeconds: 10
            periodSeconds: 30
