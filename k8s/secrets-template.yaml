# ── Secrets template — DO NOT commit real values ──────────────────────────────
# Create secrets via:
#   kubectl create secret generic geocore-secrets \
#     --from-literal=DB_PRIMARY_URL=postgres://... \
#     --from-literal=DB_REPLICA_URL=postgres://... \
#     --from-literal=REDIS_PASSWORD=... \
#     --from-literal=JWT_SECRET=... \
#     --from-literal=STRIPE_SECRET_KEY=... \
#     --from-literal=KAFKA_BROKERS=kafka-svc:9092 \
#     -n geocore-prod --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: geocore-secrets
  namespace: geocore-prod
type: Opaque
stringData:
  DB_PRIMARY_URL: "postgres://geocore:<password>@postgres-primary-svc:5432/geocore_prod?sslmode=require"
  DB_REPLICA_URL: "postgres://geocore:<password>@postgres-replica-svc:5432/geocore_prod?sslmode=require"
  REDIS_URL: "redis://:${REDIS_PASSWORD}@redis-svc:6379/0"
  REDIS_PASSWORD: "<redis-password>"
  JWT_SECRET: "<64-char-secret>"
  STRIPE_SECRET_KEY: "sk_live_..."
  STRIPE_WEBHOOK_SECRET: "whsec_..."
  KAFKA_BROKERS: "kafka-svc:9092"
  PAYMOB_API_KEY: ""
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  POSTHOG_API_KEY: ""
  SENTRY_DSN: ""
