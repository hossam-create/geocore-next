apiVersion: apps/v1
kind: Deployment
metadata:
  name: geocore-saas-cp
  namespace: geocore-prod
  labels:
    app: geocore-saas-cp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geocore-saas-cp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: geocore-saas-cp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: geocore-backend
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: saas-cp
          image: __ECR_REGISTRY__/geocore-saas-cp:latest
          ports:
            - containerPort: 9000
              name: http
          envFrom:
            - configMapRef:
                name: geocore-config
            - secretRef:
                name: geocore-secrets
          env:
            - name: SAAS_CP_PORT
              value: "9000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 3
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
---
apiVersion: v1
kind: Service
metadata:
  name: geocore-saas-cp-svc
  namespace: geocore-prod
spec:
  selector:
    app: geocore-saas-cp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 9000
