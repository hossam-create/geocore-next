name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Vet
        run: cd backend && go vet ./...

      - name: Test
        run: cd backend && go test ./...

      - name: Build
        run: cd backend && go build -o /tmp/api ./cmd/api/main.go
