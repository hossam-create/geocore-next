# Render Blueprint — GeoCore Next backend API.
#
# Deploys:
#   * geocore-api      (Go web service, Dockerfile-based, outer backend)
#   * geocore-redis    (Render Key-Value / Redis)
#   * geocore-db       (Render Postgres 16, PostGIS enabled at app startup via AutoMigrate)
#
# The "free" plans below are fine for dev / staging but note:
#   * Free Postgres is wiped after 90 days.
#   * Free web services spin down after 15 min idle — cold-start 20–30s.
# Upgrade to "starter" plans ($7/mo each) before app-store submission.

services:
  - type: web
    name: geocore-api
    runtime: docker
    region: oregon
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: GIN_MODE
        value: release
      - key: PORT
        value: "8080"
      # ── Postgres (Render-managed) ──────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: geocore-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
      # ── Redis (Render Key-Value) ───────────────────────────────────────
      - key: REDIS_URL
        fromService:
          name: geocore-redis
          type: redis
          property: connectionString
      # ── JWT / session secrets (auto-generated once) ────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      # ── Mobile/Web origins for CORS ────────────────────────────────────
      - key: FRONTEND_URL
        value: https://geocore-api.onrender.com
      # ── Secrets you add manually in the Render dashboard ───────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: MEILI_HOST
        sync: false
      - key: MEILI_MASTER_KEY
        sync: false
      # Firebase service account JSON for FCM push notifications.
      # Paste the entire JSON as a single line (or multi-line) string.
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      # APNs push credentials (iOS).
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_TEAM_ID
        sync: false
      - key: APNS_KEY_P8
        sync: false
      - key: APNS_BUNDLE_ID
        value: com.geocore.next

  - type: redis
    name: geocore-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: geocore-db
    databaseName: geocore
    user: geocore
    region: oregon
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
